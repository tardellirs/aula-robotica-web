<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 1 · Parte 2 — LDR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>☀️ Atividade 1 · Parte 2</h1>
  <div class="subtitulo">Mostrar o valor do sensor de luz (LDR) na página</div>

  <div><button class="conectar" onclick="conectar()">🔌 Conectar ao Arduino</button></div>

  <!-- Valor do LDR + barra que enche conforme a luz -->
  <div class="cartao">
    <div class="rotulo">Sensor de luz (LDR)</div>
    <div class="valor amarelo" id="ldr">--</div>
  </div>
  <div class="barra-fundo"><div class="barra" id="barra"></div></div>

  <!-- O botão do LED continua aqui (da Parte 1) -->
  <div><button class="led" id="botaoLed" onclick="alternar()">⚫ LED desligado — clique para ligar</button></div>

  <div class="dica">
    Tape o LDR com a mão: o número e a barra <b>caem</b>. Aponte uma lanterna: <b>sobem</b>.
    O valor vai de 0 (escuro) a 1023 (muita luz).
  </div>

  <script src="serial.js"></script>
  <script>
    // Agora usamos os dados que chegam: cada linha é um JSON como {"ldr":512}
    async function conectar() {
      await conectarArduino(function (linha) {
        let dados;
        try { dados = JSON.parse(linha); } catch (e) { return; }  // ignora linha incompleta

        document.getElementById("ldr").innerText = dados.ldr;
        // barra: 0..1023 vira 0%..100% de largura
        document.getElementById("barra").style.width = (dados.ldr / 1023 * 100) + "%";
      });
    }

    // Botão do LED (igual à Parte 1)
    let aceso = false;
    function alternar() {
      aceso = !aceso;
      enviarComando(aceso ? "1" : "0");
      const botao = document.getElementById("botaoLed");
      botao.classList.toggle("on", aceso);
      botao.innerText = aceso
        ? "💡 LED ligado — clique para desligar"
        : "⚫ LED desligado — clique para ligar";
    }
  </script>
</body>
</html>

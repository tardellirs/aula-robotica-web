<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 2 · Parte 1 — Distância</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📏 Atividade 2 · Parte 1</h1>
  <div class="subtitulo">Medir a distância de um objeto com o sensor ultrassônico</div>

  <div><button class="conectar" onclick="conectar()">🔌 Conectar ao Arduino</button></div>

  <div class="cartao">
    <div class="rotulo">Distância</div>
    <div class="valor azul"><span id="dist">--</span> <span class="unidade">cm</span></div>
  </div>

  <div class="dica">
    Aproxime e afaste a mão (ou um objeto) da frente do sensor: o número muda.
    Se aparecer <b>-1</b>, é porque não há nada dentro do alcance (mire em algo até ~1 metro).
  </div>

  <script src="serial.js"></script>
  <script>
    // Cada linha é um JSON como {"dist":23.4,"pot":780}. Nesta parte usamos só a distância.
    async function conectar() {
      await conectarArduino(function (linha) {
        let dados;
        try { dados = JSON.parse(linha); } catch (e) { return; }
        document.getElementById("dist").innerText = dados.dist;
      });
    }
  </script>
</body>
</html>
